name: kev-catalog
description: 'LinkML schema for the CISA Known Exploited Vulnerabilities (KEV) Catalog.

  The KEV catalog is the authoritative source of vulnerabilities that have

  been exploited in the wild, maintained by the Cybersecurity and

  Infrastructure Security Agency (CISA).'
title: CISA Known Exploited Vulnerabilities (KEV) Catalog
notes:
- This is a Schema. The KEV database is distributed under the CC0 1.0 Universal license.
  You may use this data in any legal manner but note that information  provided at
  any 3rd party links included in the KEV database are bound by the policies and licenses
  of those 3rd party websites. Use of the information does not authorize you to use
  the CISA Logo or DHS Seal, nor should such use be interpreted as an endorsement
  by CISA or DHS.
- Mandated by Binding Operational Directive (BOD) 22-01, "Reducing the Significant
  Risk of Known Exploited Vulnerabilities", issued under the authority of Section
  3553(b)(2) of title 44, U.S. Code.
- BOD 22-01 applies to all federal civilian executive branch (FCEB) departments and
  agencies. It does NOT apply to statutorily defined national security systems nor
  to systems operated by the Department of Defense or the Intelligence Community.
- "BOD 22-01 key compliance milestones: Nov 17 2021 \u2014 remediate CVEs assigned\
  \ 2021+; Jan 2 2022 \u2014 update agency policies; Jan 17 2022 \u2014 first CyberScope\
  \ status report; May 3 2022 \u2014 remediate pre-2021 CVEs; Oct 1 2022 \u2014 reporting\
  \ via CDM Federal Dashboard."
- As of 2022-07-15 the KEV catalog contained 787 entries drawn from a universe of
  ~179,383 total CVEs (56,342 Critical/High by CVSS).
- 'Contact: CyberDirectives@cisa.dhs.gov for questions about BOD 22-01 and the KEV
  catalog; CyberLiaison@cisa.dhs.gov for all other CISA questions.'
source: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities_schema.json
see_also:
- https://lmodel.github.io/kev-catalog
- https://www.cisa.gov/known-exploited-vulnerabilities-catalog
- https://www.cisa.gov/directives
- https://www.cisa.gov/binding-operational-directive-22-01
- https://weis2020.econinfosec.org/wp-content/uploads/sites/8/2020/06/weis20-final6.pdf
id: https://w3id.org/lmodel/kev-catalog
version: '1.0'
imports:
- linkml:types
license: Apache-2.0
prefixes:
  kev_catalog:
    prefix_prefix: kev_catalog
    prefix_reference: https://w3id.org/lmodel/kev-catalog/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  WIKIDATA:
    prefix_prefix: WIKIDATA
    prefix_reference: http://identifiers.org/wikidata/
default_prefix: kev_catalog
default_range: string
types:
  CveId:
    name: CveId
    definition_uri: https://w3id.org/lmodel/kev-catalog/CveId
    description: A CVE identifier in the format CVE-YYYY-NNNNN as assigned by a CVE
      Numbering Authority (CNA).
    notes:
    - 'The first KEV inclusion criterion: the vulnerability must have an assigned
      CVE ID. The CVE Program is sponsored by CISA and operated by The MITRE Corporation.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    base: str
    uri: xsd:string
    pattern: ^CVE-[0-9]{4}-[0-9]+$
  IsoDate:
    name: IsoDate
    definition_uri: https://w3id.org/lmodel/kev-catalog/IsoDate
    description: A date in ISO 8601 format (YYYY-MM-DD).
    from_schema: https://w3id.org/lmodel/kev-catalog
    base: str
    uri: xsd:date
    pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  KnownRansomwareCampaignUseEnum:
    name: KnownRansomwareCampaignUseEnum
    definition_uri: https://w3id.org/lmodel/kev-catalog/KnownRansomwareCampaignUseEnum
    description: Whether the vulnerability is known to have been used in ransomware
      campaigns.
    comments:
    - CISA uses this field to signal whether the KEV entry has been observed as part
      of ransomware activity, enabling organizations to further prioritize their remediation
      efforts beyond the base BOD 22-01 timeline.
    from_schema: https://w3id.org/lmodel/kev-catalog
    permissible_values:
      known:
        text: known
        description: The vulnerability is known to have been used in a ransomware
          campaign.
        meaning: WIKIDATA:Q532924
      unknown:
        text: unknown
        description: It is not known whether the vulnerability has been used in a
          ransomware campaign.
slots:
  cve_id:
    name: cve_id
    definition_uri: https://w3id.org/lmodel/kev-catalog/cve_id
    description: 'The CVE identifier assigned to this vulnerability by a CVE Numbering
      Authority (CNA). Format: CVE-YYYY-NNNNN.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - cveID
    mappings:
    - dcterms:identifier
    exact_mappings:
    - schema:identifier
    slot_uri: dcterms:identifier
    identifier: true
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: CveId
    required: true
  vendor_project:
    name: vendor_project
    definition_uri: https://w3id.org/lmodel/kev-catalog/vendor_project
    description: The name of the vendor or project responsible for the affected product.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - vendorProject
    mappings:
    - schema:Organization
    slot_uri: schema:Organization
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: string
    required: true
  product:
    name: product
    definition_uri: https://w3id.org/lmodel/kev-catalog/product
    description: The name of the affected product.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - product
    mappings:
    - schema:name
    slot_uri: schema:name
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: string
    required: true
  vulnerability_name:
    name: vulnerability_name
    definition_uri: https://w3id.org/lmodel/kev-catalog/vulnerability_name
    description: A short, descriptive name for the vulnerability.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - vulnerabilityName
    mappings:
    - dcterms:title
    slot_uri: dcterms:title
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: string
    required: true
  date_added:
    name: date_added
    definition_uri: https://w3id.org/lmodel/kev-catalog/date_added
    description: The date (YYYY-MM-DD) the vulnerability was added to the KEV catalog.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - dateAdded
    mappings:
    - dcterms:created
    slot_uri: dcterms:created
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: IsoDate
    required: true
  short_description:
    name: short_description
    definition_uri: https://w3id.org/lmodel/kev-catalog/short_description
    description: A brief description of the vulnerability.
    comments:
    - 'KEV inclusion criterion #2 requires reliable evidence that the vulnerability
      has been actively exploited in the wild. Active exploitation includes attempted
      and successful exploitation; scanning, security research, and public PoC alone
      do not qualify.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - shortDescription
    mappings:
    - dcterms:description
    slot_uri: dcterms:description
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: string
    required: true
  required_action:
    name: required_action
    definition_uri: https://w3id.org/lmodel/kev-catalog/required_action
    description: The remediation action required, e.g. "Apply updates per vendor instructions."
    comments:
    - 'BOD 22-01 specifies two acceptable actions: (1) apply updates per vendor instructions,
      or (2) remove the product from agency networks if it is end-of-life or cannot
      otherwise be updated. Temporary mitigations and workarounds may be applied while
      awaiting a vendor patch.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - requiredAction
    slot_uri: kev_catalog:required_action
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: string
    required: true
  due_date:
    name: due_date
    definition_uri: https://w3id.org/lmodel/kev-catalog/due_date
    description: The date (YYYY-MM-DD) by which federal civilian executive branch
      (FCEB) agencies must remediate the vulnerability per BOD 22-01.
    comments:
    - Deadline set by CISA. Under BOD 19-02, internet-accessible critical vulnerabilities
      (CVSS >9.0) must be remediated within 15 calendar days and high vulnerabilities
      (7.0-9.0) within 30 calendar days of initial detection; BOD 22-01 due dates
      may be tighter and apply to all agency systems, not only internet-accessible
      ones.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - dueDate
    slot_uri: kev_catalog:due_date
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: IsoDate
    required: true
  known_ransomware_campaign_use:
    name: known_ransomware_campaign_use
    definition_uri: https://w3id.org/lmodel/kev-catalog/known_ransomware_campaign_use
    description: Whether the vulnerability is known to have been leveraged as part
      of a ransomware campaign.
    notes:
    - CISA encourages organizations with evidence of exploited vulnerabilities not
      listed in the KEV to submit them to vulnerability@mail.cisa.dhs.gov.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - knownRansomwareCampaignUse
    slot_uri: kev_catalog:known_ransomware_campaign_use
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: KnownRansomwareCampaignUseEnum
    required: false
  notes:
    name: notes
    definition_uri: https://w3id.org/lmodel/kev-catalog/notes
    description: Additional notes or references related to the vulnerability or its
      remediation.
    from_schema: https://w3id.org/lmodel/kev-catalog
    mappings:
    - skos:note
    slot_uri: skos:note
    owner: Vulnerability
    domain_of:
    - Vulnerability
    range: string
    required: false
  title:
    name: title
    definition_uri: https://w3id.org/lmodel/kev-catalog/title
    description: The title of the KEV catalog.
    from_schema: https://w3id.org/lmodel/kev-catalog
    mappings:
    - dcterms:title
    slot_uri: dcterms:title
    owner: KevCatalog
    domain_of:
    - KevCatalog
    range: string
  catalog_version:
    name: catalog_version
    definition_uri: https://w3id.org/lmodel/kev-catalog/catalog_version
    description: The version string of the KEV catalog release.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - catalogVersion
    slot_uri: kev_catalog:catalog_version
    owner: KevCatalog
    domain_of:
    - KevCatalog
    range: string
  date_released:
    name: date_released
    definition_uri: https://w3id.org/lmodel/kev-catalog/date_released
    description: The ISO 8601 timestamp at which this catalog version was released.
    from_schema: https://w3id.org/lmodel/kev-catalog
    aliases:
    - dateReleased
    slot_uri: kev_catalog:date_released
    owner: KevCatalog
    domain_of:
    - KevCatalog
    range: string
  count:
    name: count
    definition_uri: https://w3id.org/lmodel/kev-catalog/count
    description: The total number of vulnerabilities in this catalog version.
    from_schema: https://w3id.org/lmodel/kev-catalog
    slot_uri: kev_catalog:count
    owner: KevCatalog
    domain_of:
    - KevCatalog
    range: integer
  vulnerabilities:
    name: vulnerabilities
    definition_uri: https://w3id.org/lmodel/kev-catalog/vulnerabilities
    description: The list of known exploited vulnerabilities.
    from_schema: https://w3id.org/lmodel/kev-catalog
    slot_uri: kev_catalog:vulnerabilities
    owner: KevCatalog
    domain_of:
    - KevCatalog
    range: Vulnerability
    multivalued: true
    inlined: true
    inlined_as_list: true
classes:
  Vulnerability:
    name: Vulnerability
    definition_uri: https://w3id.org/lmodel/kev-catalog/Vulnerability
    description: A single entry in the CISA Known Exploited Vulnerabilities (KEV)
      catalog, representing one CVE that has been confirmed exploited in the wild
      and for which clear remediation guidance exists.
    comments:
    - 'Three criteria must all be met for inclusion: (1) assigned CVE ID, (2) reliable
      evidence of active exploitation in the wild, and (3) clear remediation guidance
      (vendor update or EOL removal).'
    - 'BOD 22-01 focuses on a small, high-signal subset of all vulnerabilities: as
      of 2022-07-15 the catalog contained 787 KEVs from a universe of ~179,383 CVEs,
      and approximately 20 of those KEVs were the most prevalent across the entire
      federal enterprise.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    see_also:
    - https://www.cisa.gov/known-exploited-vulnerabilities-catalog
    exact_mappings:
    - schema:SoftwareApplication
    - WIKIDATA:Q16798631
    slots:
    - cve_id
    - vendor_project
    - product
    - vulnerability_name
    - date_added
    - short_description
    - required_action
    - due_date
    - known_ransomware_campaign_use
    - notes
    class_uri: kev_catalog:Vulnerability
  KevCatalog:
    name: KevCatalog
    definition_uri: https://w3id.org/lmodel/kev-catalog/KevCatalog
    annotations:
      directive_id:
        tag: directive_id
        value: BOD 22-01
      directive_date:
        tag: directive_date
        value: '2021-11-03'
      legal_authority:
        tag: legal_authority
        value: "44 U.S.C. \xA7 3553(b)(2)"
      issuing_body:
        tag: issuing_body
        value: Department of Homeland Security / CISA
      contact_directives:
        tag: contact_directives
        value: CyberDirectives@cisa.dhs.gov
      contact_general:
        tag: contact_general
        value: CyberLiaison@cisa.dhs.gov
    description: "The CISA Known Exploited Vulnerabilities (KEV) Catalog \u2014 the\
      \ authoritative source of vulnerabilities confirmed exploited in the wild, maintained\
      \ by CISA per Binding Operational Directive (BOD) 22-01."
    comments:
    - BOD 22-01, "Reducing the Significant Risk of Known Exploited Vulnerabilities",
      was issued under Section 3553(b)(2) of title 44, U.S. Code by the Secretary
      of Homeland Security. It is a compulsory direction to all FCEB departments and
      agencies.
    - "CISA strongly recommends all organizations \u2014 including state, local, tribal\
