---
id: https://w3id.org/lmodel/kev-catalog
name: kev-catalog
title: CISA Known Exploited Vulnerabilities (KEV) Catalog
description: |-
  LinkML schema for the CISA Known Exploited Vulnerabilities (KEV) Catalog.
  The KEV catalog is the authoritative source of vulnerabilities that have
  been exploited in the wild, maintained by the Cybersecurity and
  Infrastructure Security Agency (CISA).
license: Apache-2.0
see_also:
  - https://lmodel.github.io/kev-catalog
  - https://www.cisa.gov/known-exploited-vulnerabilities-catalog
  - https://www.cisa.gov/directives
  - https://www.cisa.gov/binding-operational-directive-22-01
  - https://weis2020.econinfosec.org/wp-content/uploads/sites/8/2020/06/weis20-final6.pdf

source: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities_schema.json
version: "1.0"
notes:
  - >-
    This is a Schema. The KEV database is distributed under the CC0 1.0 Universal
    license. You may use this data in any legal manner but note that information 
    provided at any 3rd party links included in the KEV database are bound by the
    policies and licenses of those 3rd party websites. Use of the information
    does not authorize you to use the CISA Logo or DHS Seal, nor should such use
    be interpreted as an endorsement by CISA or DHS.
  - >-
    Mandated by Binding Operational Directive (BOD) 22-01, "Reducing the
    Significant Risk of Known Exploited Vulnerabilities", issued under the
    authority of Section 3553(b)(2) of title 44, U.S. Code.
  - >-
    BOD 22-01 applies to all federal civilian executive branch (FCEB) departments
    and agencies. It does NOT apply to statutorily defined national security
    systems nor to systems operated by the Department of Defense or the
    Intelligence Community.
  - >-
    BOD 22-01 key compliance milestones: Nov 17 2021 — remediate CVEs assigned
    2021+; Jan 2 2022 — update agency policies; Jan 17 2022 — first CyberScope
    status report; May 3 2022 — remediate pre-2021 CVEs; Oct 1 2022 — reporting
    via CDM Federal Dashboard.
  - >-
    As of 2022-07-15 the KEV catalog contained 787 entries drawn from a universe
    of ~179,383 total CVEs (56,342 Critical/High by CVSS).
  - >-
    Contact: CyberDirectives@cisa.dhs.gov for questions about BOD 22-01 and the
    KEV catalog; CyberLiaison@cisa.dhs.gov for all other CISA questions.

prefixes:
  kev_catalog: https://w3id.org/lmodel/kev-catalog/
  core: https://w3id.org/lmodel/vulnerability-core/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  xsd:    "http://www.w3.org/2001/XMLSchema#"
  rdfs:   "http://www.w3.org/2000/01/rdf-schema#"
  skos:   "http://www.w3.org/2004/02/skos/core#"
  WIKIDATA: https://www.wikidata.org/wiki/

default_prefix: kev_catalog
default_range: string

imports:
  - linkml:types
  - ./vulnerability_core

types: {}  # no additional types beyond vulnerability_core

enums:
  KnownRansomwareCampaignUseEnum:
    description: >-
      Whether the vulnerability is known to have been used in ransomware
      campaigns.
    comments:
      - >-
        CISA uses this field to signal whether the KEV entry has been observed
        as part of ransomware activity, enabling organizations to further
        prioritize their remediation efforts beyond the base BOD 22-01 timeline.
    permissible_values:
      known:
        description: >-
          The vulnerability is known to have been used in a ransomware campaign.
      unknown:
        description: >-
          It is not known whether the vulnerability has been used in a
          ransomware campaign.

slots:
  vendor_project:
    range: string
    required: true
    description: >-
      The name of the vendor or project responsible for the affected product.
    slot_uri: schema:Organization
    aliases:
      - vendorProject

  product:
    range: string
    required: true
    description: >-
      The name of the affected product.
    slot_uri: schema:name
    aliases:
      - product

  vulnerability_name:
    range: string
    required: true
    description: >-
      A short, descriptive name for the vulnerability.
    slot_uri: dcterms:title
    aliases:
      - vulnerabilityName

  date_added:
    range: IsoDate
    required: true
    description: >-
      The date (YYYY-MM-DD) the vulnerability was added to the KEV catalog.
    slot_uri: dcterms:created
    aliases:
      - dateAdded

  short_description:
    range: string
    required: true
    description: >-
      A brief description of the vulnerability.
    comments:
      - >-
        KEV inclusion criterion #2 requires reliable evidence that the
        vulnerability has been actively exploited in the wild. Active exploitation
        includes attempted and successful exploitation; scanning, security
        research, and public PoC alone do not qualify.
    slot_uri: dcterms:description
    aliases:
      - shortDescription

  required_action:
    range: string
    required: true
    description: >-
      The remediation action required, e.g. "Apply updates per vendor
      instructions."
    comments:
      - >-
        BOD 22-01 specifies two acceptable actions: (1) apply updates per vendor
        instructions, or (2) remove the product from agency networks if it is
        end-of-life or cannot otherwise be updated. Temporary mitigations and
        workarounds may be applied while awaiting a vendor patch.
    aliases:
      - requiredAction

  due_date:
    range: IsoDate
    required: true
    description: >-
      The date (YYYY-MM-DD) by which federal civilian executive branch (FCEB)
      agencies must remediate the vulnerability per BOD 22-01.
    comments:
      - >-
        Deadline set by CISA. Under BOD 19-02, internet-accessible critical
        vulnerabilities (CVSS >9.0) must be remediated within 15 calendar days
        and high vulnerabilities (7.0-9.0) within 30 calendar days of initial
        detection; BOD 22-01 due dates may be tighter and apply to all agency
        systems, not only internet-accessible ones.
    aliases:
      - dueDate

  known_ransomware_campaign_use:
    range: KnownRansomwareCampaignUseEnum
    required: false
    description: >-
      Whether the vulnerability is known to have been leveraged as part of a
      ransomware campaign.
    notes:
      - >-
        CISA encourages organizations with evidence of exploited vulnerabilities
        not listed in the KEV to submit them to vulnerability@mail.cisa.dhs.gov.
    aliases:
      - knownRansomwareCampaignUse

  notes:
    range: string
    required: false
    description: >-
      Additional notes or references related to the vulnerability or its
      remediation.
    slot_uri: skos:note

  # --- catalog-level slots ---
  catalog_version:
    range: string
    description: The version string of the KEV catalog release.
    aliases:
      - catalogVersion

  date_released:
    range: string
    description: The ISO 8601 timestamp at which this catalog version was released.
    aliases:
      - dateReleased

  count:
    range: integer
    description: The total number of vulnerabilities in this catalog version.

  vulnerabilities:
    range: KevEntry
    multivalued: true
    inlined_as_list: true
    description: The list of known exploited vulnerabilities.

classes:
  KevEntry:
    is_a: Vulnerability
    description: >-
      A single entry in the CISA Known Exploited Vulnerabilities (KEV) catalog,
      representing one CVE that has been confirmed exploited in the wild and for
      which clear remediation guidance exists.
    comments:
      - >-
        Three criteria must all be met for inclusion: (1) assigned CVE ID,
        (2) reliable evidence of active exploitation in the wild, and
        (3) clear remediation guidance (vendor update or EOL removal).
      - >-
        BOD 22-01 focuses on a small, high-signal subset of all vulnerabilities:
        as of 2022-07-15 the catalog contained 787 KEVs from a universe of
        ~179,383 CVEs, and approximately 20 of those KEVs were the most
        prevalent across the entire federal enterprise.
    slots:
      - vendor_project
      - product
      - vulnerability_name
      - date_added
      - short_description
      - required_action
      - due_date
      - known_ransomware_campaign_use
      - notes
    related_mappings:
      - schema:SoftwareApplication
      - WIKIDATA:Q166142  # application software
    exact_mappings:
      - WIKIDATA:Q631425  # software vulnerability
    see_also:
      - https://www.cisa.gov/known-exploited-vulnerabilities-catalog

  KevCatalog:
    tree_root: true
    description: >-
      The CISA Known Exploited Vulnerabilities (KEV) Catalog — the authoritative
      source of vulnerabilities confirmed exploited in the wild, maintained by
      CISA per Binding Operational Directive (BOD) 22-01.
    comments:
      - >-
        BOD 22-01, "Reducing the Significant Risk of Known Exploited
        Vulnerabilities", was issued under Section 3553(b)(2) of title 44,
        U.S. Code by the Secretary of Homeland Security. It is a compulsory
        direction to all FCEB departments and agencies.
      - >-
        CISA strongly recommends all organizations — including state, local,
        tribal and territorial (SLTT) governments and private sector — prioritize
        remediation of KEV catalog entries as part of their vulnerability
        management plan, even though BOD 22-01 itself only binds FCEB agencies.
      - >-
        BOD 22-01 does not apply to: national security systems (as defined by
        statute), systems operated by the Department of Defense, or systems
        operated by the Intelligence Community.
    annotations:
      directive_id: "BOD 22-01"
      directive_date: "2021-11-03"
      legal_authority: "44 U.S.C. § 3553(b)(2)"
      issuing_body: "Department of Homeland Security / CISA"
      contact_directives: "CyberDirectives@cisa.dhs.gov"
      contact_general: "CyberLiaison@cisa.dhs.gov"
    slots:
      - title
      - catalog_version
      - date_released
      - count
      - vulnerabilities
    slot_usage:
      title:
        description: The title of the KEV catalog.
    broad_mappings:
      - WIKIDATA:Q2352616  # catalog
    close_mappings:
      - schema:Dataset
    see_also:
      - https://www.cisa.gov/directives
      - https://www.cisa.gov/binding-operational-directive-22-01

