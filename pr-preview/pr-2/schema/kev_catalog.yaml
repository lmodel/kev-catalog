classes:
  KevEntry:
    name: KevEntry
    definition_uri: https://w3id.org/lmodel/kev-catalog/KevEntry
    description: A single entry in the CISA Known Exploited Vulnerabilities (KEV)
      catalog, representing one CVE that has been confirmed exploited in the wild
      and for which clear remediation guidance exists.
    comments:
    - 'Three criteria must all be met for inclusion: (1) assigned CVE ID, (2) reliable
      evidence of active exploitation in the wild, and (3) clear remediation guidance
      (vendor update or EOL removal).'
    - 'BOD 22-01 focuses on a small, high-signal subset of all vulnerabilities: as
      of 2022-07-15 the catalog contained 787 KEVs from a universe of ~179,383 CVEs,
      and approximately 20 of those KEVs were the most prevalent across the entire
      federal enterprise.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    see_also:
    - https://www.cisa.gov/known-exploited-vulnerabilities-catalog
    exact_mappings:
    - WIKIDATA:Q631425
    related_mappings:
    - schema:SoftwareApplication
    - WIKIDATA:Q166142
    is_a: Vulnerability
    slots:
    - Vulnerability_cve_id
    - title
    - Vulnerability_description
    - published_date
    - last_modified_date
    - products
    - weaknesses
    - references
    - impact
    - status
    - vendor_project
    - product
    - vulnerability_name
    - date_added
    - short_description
    - required_action
    - due_date
    - known_ransomware_campaign_use
    - notes
    class_uri: kev_catalog:KevEntry
  KevCatalog:
    name: KevCatalog
    definition_uri: https://w3id.org/lmodel/kev-catalog/KevCatalog
    annotations:
      directive_id:
        tag: directive_id
        value: BOD 22-01
      directive_date:
        tag: directive_date
        value: '2021-11-03'
      legal_authority:
        tag: legal_authority
        value: "44 U.S.C. \xA7 3553(b)(2)"
      issuing_body:
        tag: issuing_body
        value: Department of Homeland Security / CISA
      contact_directives:
        tag: contact_directives
        value: CyberDirectives@cisa.dhs.gov
      contact_general:
        tag: contact_general
        value: CyberLiaison@cisa.dhs.gov
    description: "The CISA Known Exploited Vulnerabilities (KEV) Catalog \u2014 the\
      \ authoritative source of vulnerabilities confirmed exploited in the wild, maintained\
      \ by CISA per Binding Operational Directive (BOD) 22-01."
    comments:
    - BOD 22-01, "Reducing the Significant Risk of Known Exploited Vulnerabilities",
      was issued under Section 3553(b)(2) of title 44, U.S. Code by the Secretary
      of Homeland Security. It is a compulsory direction to all FCEB departments and
      agencies.
    - "CISA strongly recommends all organizations \u2014 including state, local, tribal\
      \ and territorial (SLTT) governments and private sector \u2014 prioritize remediation\
      \ of KEV catalog entries as part of their vulnerability management plan, even\
      \ though BOD 22-01 itself only binds FCEB agencies."
    - 'BOD 22-01 does not apply to: national security systems (as defined by statute),
      systems operated by the Department of Defense, or systems operated by the Intelligence
      Community.'
    from_schema: https://w3id.org/lmodel/kev-catalog
    see_also:
    - https://www.cisa.gov/directives
    - https://www.cisa.gov/binding-operational-directive-22-01
    close_mappings:
    - schema:Dataset
    broad_mappings:
    - WIKIDATA:Q2352616
    slots:
    - KevCatalog_title
    - catalog_version
    - date_released
    - count
    - vulnerabilities
    slot_usage:
      title:
        name: title
        description: The title of the KEV catalog.
    class_uri: kev_catalog:KevCatalog
    tree_root: true
  Vulnerability:
    name: Vulnerability
    definition_uri: https://w3id.org/lmodel/vulnerability-core/Vulnerability
    description: Abstract base representation of a security vulnerability. Extended
      by source-specific schemas (KEV, CVE, NVD).
    in_subset:
    - core
    from_schema: https://w3id.org/lmodel/vulnerability-core
    exact_mappings:
    - WIKIDATA:Q631425
    related_mappings:
    - schema:SoftwareApplication
    abstract: true
    slots:
    - Vulnerability_cve_id
    - title
    - Vulnerability_description
    - published_date
    - last_modified_date
    - products
    - weaknesses
    - references
    - impact
    - status
    slot_usage:
      cve_id:
        name: cve_id
        required: true
      description:
        name: description
        required: true
